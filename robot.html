<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: linear-gradient(to left, purple,rgb(194, 0, 194), rgb(147, 147, 147));
  
        animation: color 2s infinite alternate;
      }
      @keyframes color {
    0% {
        background-position: 0% 0%;
    }
    100% {
        background-position: 100% 0%;
    }

      }

      .form {
        background-color: rgba(255, 255, 255, 0.3);
        width: 40%;
        padding: 30px;
        margin: auto;
        text-align: center;
        border-radius: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      label {
        margin-bottom: 5px;
        font-size: 20px;
             font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
             font-weight: bolder;
      }
      .input {
        margin-bottom: 10px;
        text-align: center;
        width: 150px;
        margin: auto;
        font-size: 17px;
        border-radius: 10px;
        background-color: rgb(255, 255, 255,0.7);
        border: none;
      }
      .btn-code {
        width: 100px;
        height: 25px;
        margin: auto;
        margin-top: 20px;
        background-color: blueviolet;
        border: none;
        border-radius: 20px;
        font-size: 17px;
        font-weight: bolder;
      }
      .code {
        text-align: center;
      }
      .correct {
        text-align: center;
        background-color: rgba(96, 96, 96, 0.533);
        width: 50%;
        margin: auto;
        padding: 5px;
        border-radius: 15px;
        border: 5px solid rgb(1, 189, 1);
        display: none;
        margin-bottom: 10px;
      }
      .incorrect {
        text-align: center;
        background-color: rgba(96, 96, 96, 0.533);
        width: 60%;
        margin: auto;
        padding: 5px;
        border-radius: 15px;
        border: 5px solid rgb(255, 0, 0);
        display: none;
        margin-bottom: 10px;
      }
      /* یه کمی استایل به تایمر بدید */
      .timer {
        text-align: center;
        color: white;
        background-color: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 10px;
        width: 30%;
        margin: 20px auto;
      }
      @media screen and (min-width:768px) {
        .form{
          width: 30%;
        }
        .timer{
          width: 15%;
        }
      }
    </style>
  </head>
  <body dir="rtl">
    <h2 id="correct" class="correct">کد درست است خوش امدید</h2>
    <h2 id="incorrect" class="incorrect">کد درست نیست دوباره وارد کنید</h2>
    <div class="form">
      <form>
        <label>کد را وارد کنید</label>
        <input class="input" id="input" type="number" placeholder="کد" />
      </form>
      <button class="btn-code" id="btn">وارد شوید</button>
    </div>
    <div class="code-row">
          <h2 class="code">کد: <span id="span">0</span></h2>
    <h3 class="timer">ثانیه:<span id="timer">30</span></h3>
    </div>

   <script>
  // همه متغیرها
  const input = document.getElementById("input");
  const btn = document.getElementById("btn");
  const span = document.getElementById("span");
  const correct = document.getElementById("correct");
  const incorrect = document.getElementById("incorrect");
  const timerDisplay = document.getElementById("timer");

  // متغیرهای تایمر
  let timeLeft = 30;
  let timerInterval;
  let codeTimer;
  let editcode; // متغیر اصلی کد

  // تابع تولید کد جدید
  function generateNewCode() {
    // تولید کد جدید
    let code = [
      Math.floor(Math.random() * 5) + 1,
      Math.floor(Math.random() * 5) + 1,
      Math.floor(Math.random() * 5) + 1,
      Math.floor(Math.random() * 5) + 1,
      Math.floor(Math.random() * 5) + 1,
      Math.floor(Math.random() * 5) + 1,
    ];
    editcode = code.join("");
    span.textContent = editcode;

    setTimeout(() => {
      correct.style.display = "none";
      correct.textContent = "کد درست است خوش آمدید";
      correct.style.borderColor = "rgb(1, 189, 1)";
    }, 2000);

    // ریست تایمر شمارش معکوس
    timeLeft = 30;
    timerDisplay.textContent = timeLeft;
  }

  // تابع شروع تایمرها
  function startTimers() {
    // تایمر تغییر کد (هر ۳۰ ثانیه)
    codeTimer = setInterval(generateNewCode, 30000);

    // تایمر شمارش معکوس (هر ۱ ثانیه)
    timerInterval = setInterval(() => {
      timeLeft--;

      // آپدیت عدد توی صفحه
      timerDisplay.textContent = timeLeft;

      // تغییر رنگ تایمر وقتی به ۱۰ ثانیه میرسه
      if (timeLeft <= 10) {
        timerDisplay.style.color = "red";
        timerDisplay.style.fontWeight = "bold";
      } else {
        timerDisplay.style.color = "white";
        timerDisplay.style.fontWeight = "normal";
      }

      // اگه به صفر رسیدیم
      if (timeLeft === 0) {
        timeLeft = 30; // ریست برای سیکل بعدی
      }
    }, 1000);
  }

  // شروع تایمرها وقتی صفحه لود میشه
  startTimers();

  // کد بررسی ورودی
  btn.addEventListener("click", function () {
    let userinput = input.value;

    // بررسی خالی نبودن ورودی
    if (userinput === "") {
      incorrect.style.display = "block";
      incorrect.textContent = "❌ لطفاً کد را وارد کنید!";

      setTimeout(() => {
        incorrect.style.display = "none";
        incorrect.textContent = "کد درست نیست دوباره وارد کنید";
      }, 2000);

      input.focus();
      return;
    }

    // بررسی درستی کد
    if (userinput === editcode) {
      // مخفی کردن پیام اشتباه
      incorrect.style.display = "none";

      // نمایش پیام درست
      correct.style.display = "block";
      correct.textContent = "✅ کد درست است! خوش آمدید";
      correct.style.borderColor = "rgb(1, 189, 1)";
      
      // ذخیره وضعیت تایید ربات
      localStorage.setItem('robotVerified', 'true');
      localStorage.setItem('verificationTime', Date.now());

      // بعد از ۳ ثانیه پیام رو مخفی کن و به صفحه ثبت نام برو
      setTimeout(() => {
        correct.style.display = "none";
        window.location.href = "sing up.html";
      }, 2000);

      // اینجا می‌تونید کاربر رو به صفحه دیگه هدایت کنید
      // setTimeout(() => {
      //   window.location.href = "https://example.com";
      // }, 1000);
    } else {
      // مخفی کردن پیام درست
      correct.style.display = "none";

      // نمایش پیام اشتباه
      incorrect.style.display = "block";
      incorrect.textContent = "❌ کد اشتباه است! دوباره تلاش کنید";
      incorrect.style.borderColor = "rgb(255, 0, 0)";

      // بعد از ۳ ثانیه پیام رو مخفی کن
      setTimeout(() => {
        incorrect.style.display = "none";
        incorrect.textContent = "کد درست نیست دوباره وارد کنید";
      }, 3000);

      // پاک کردن اینپوت و فوکوس
      input.value = "";
      input.focus();
    }
  });

  // تولید اولین کد
  generateNewCode();

  // اضافه کردن قابلیت اینتر زدن
  input.addEventListener("keypress", function (event) {
    if (event.key === "Enter") {
      event.preventDefault(); // جلوگیری از ارسال فرم
      btn.click(); // کلیک کردن دکمه
    }
  });

  // هر وقت کاربر روی اینپوت کلیک کرد، پیام‌ها مخفی بشن
  input.addEventListener("focus", function () {
    correct.style.display = "none";
    incorrect.style.display = "none";
  });
</script>
  </body>
</html>
